<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<style>
    a {
        color: unset;
        text-decoration: none;
    }
</style>

<body data-bs-theme="dark">
    <div class="container-fluid bg-secondary">
        <div class="row">
            <div class="col d-flex flex-row justify-content-between align-items-center">
                <div class="h3 p-3 text-center text-white"><a href="index.html">Back</a></div>
                <div class="h3 p-3 text-center text-white">Header</div>
                <div class="h3 p-3 text-center text-white"></div>
            </div>
        </div>
    </div>

    <div class="container mt-4">
        <div class="row justify-content-center align-items-center">
            <div class="col">
                <div class="card shadow p-4 rounded-4 text-center justify-content-center align-items-center">
                    <div class="h2" id="name"></div>
                    <img src="" id="qrpic" class="border border-lg p-3 rounded-4" style="max-width: 250px;">
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const fname = urlParams.get('fname');
        const lname = urlParams.get('lname');

        const qrpic = document.getElementById('qrpic');
        qrpic.src = "https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=https://EduCode597.github.io/academic/appdev/view.html?fname=" + fname + "%26lname=" + lname +"&color=808080&bgcolor=000000";
        document.getElementById('name').innerText = fname + ' ' + lname;
    </script>
</body>

</html>
